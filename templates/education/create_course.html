{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6" data-aos="fade-up">
        <div class="glass-card p-5 shadow-lg border-success">
            <h2 class="fw-bold mb-4"><i class="fa-solid fa-plus-circle text-success"></i> Create New Class</h2>
            <form action="{{ url_for('education.create_course') }}" method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold">Class Title</label>
                    <input type="text" name="title" class="form-control" placeholder="e.g. Organic Farming Masterclass" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Category</label>
                    <select name="category" class="form-select">
                        <option value="Organic Farming">Organic Farming</option>
                        <option value="Pest Management">Pest Management</option>
                        <option value="Business & Marketing">Business & Marketing</option>
                        <option value="Advanced Technology">Advanced Technology</option>
                    </select>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">Description</label>
                    <textarea name="description" class="form-control" rows="4" placeholder="Describe what farmers will learn in this class..."></textarea>
                </div>
                <button type="submit" class="btn btn-success w-100 py-3 rounded-pill shadow">
                    Create Classroom
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
