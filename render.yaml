services:
  - type: web
    name: agri-platform
    env: python
    healthCheckPath: /health
    buildCommand: "mkdir -p database && pip install -r requirements.txt"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: FLASK_DEBUG
        value: "false"
      - key: PYTHONUNBUFFERED
        value: "true"
