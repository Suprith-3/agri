{% extends "base.html" %}
{% block title %}Billing System{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-10">
        <div class="d-flex justify-content-between align-items-end mb-5" data-aos="fade-down">
            <div>
                <h2 class="display-5 fw-bold gradient-text mb-2">Generate Digital Bill</h2>
                <p class="text-secondary mb-0">Create bills for your customers and automatically sync stock levels.</p>
            </div>
            <a href="{{ url_for('shop.dashboard') }}" class="btn btn-outline-glow btn-sm shadow-sm px-4"><i class="fa-solid fa-arrow-left me-2"></i> Dashboard</a>
        </div>

        <form method="POST" id="billingForm">
            <div class="glass-card p-4 p-md-5 mb-5" data-aos="fade-up">
                <div class="row g-4 mb-5">
                    <div class="col-md-8">
                        <label class="form-label font-secondary small text-uppercase fw-bold letter-spacing-1 text-secondary">Customer Name</label>
                        <input type="text" name="customer_name" class="form-control" required placeholder="ex. Ramesh Kumar">
                    </div>
                </div>

                <div class="table-responsive mb-4">
                    <table class="table table-light bg-transparent mb-0" id="billTable">
                        <thead class="bg-glass-sm border-glass text-secondary small text-uppercase letter-spacing-1">
                            <tr>
                                <th style="width: 50%;">Select Item</th>
                                <th style="width: 20%;">Qty</th>
                                <th style="width: 20%;" class="text-end">Total (₹)</th>
                                <th style="width: 10%;"></th>
                            </tr>
                        </thead>
                        <tbody class="border-top-0">
                            <!-- Rows go here -->
                        </tbody>
                    </table>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-5">
                    <button type="button" class="btn btn-sm btn-outline-success border-glass rounded-pill px-4 py-2" onclick="addRow()">
                        <i class="fa-solid fa-plus-circle me-2"></i> Add Item
                    </button>
                    <div class="text-end">
                        <h6 class="text-secondary small mb-1">Grand Total</h6>
                        <h2 class="fw-bold text-success mb-0 fw-glow" id="grandTotalText">₹0</h2>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary-glow w-100 py-3 mt-3">
                    <span><i class="fa-solid fa-file-invoice-dollar me-2"></i> Complete & Print Bill</span>
                </button>
            </div>
        </form>
    </div>
</div>

<template id="rowTemplate">
    <tr class="bill-row border-glass animate__animated animate__fadeIn">
        <td class="py-4">
            <select name="product_id[]" class="form-select product-select" required onchange="calculateRow(this.closest('tr'))">
                <option value="" disabled selected>Select Product...</option>
                {% for p in products %}
                <option value="{{ p.id }}" data-price="{{ p.price }}" data-stock="{{ p.stock }}">{{ p.name }} (Stock: {{ p.stock }}) - ₹{{ p.price }}</option>
                {% endfor %}
            </select>
        </td>
        <td class="py-4">
            <input type="number" name="quantity[]" class="form-control qty-input" min="1" required placeholder="1" oninput="calculateRow(this.closest('tr'))">
        </td>
        <td class="py-4 text-end align-middle">
            <span class="row-total fw-bold text-dark">₹0</span>
        </td>
        <td class="py-4 text-end align-middle">
            <button type="button" class="btn btn-sm btn-outline-danger border-glass rounded-circle" onclick="this.closest('tr').remove(); calculateGrandTotal();"><i class="fa-solid fa-times"></i></button>
        </td>
    </tr>
</template>

{% block extra_js %}
<script>
    function addRow() {
        const table = document.querySelector('#billTable tbody');
        const template = document.getElementById('rowTemplate').innerHTML;
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = template;
        table.appendChild(tempDiv.querySelector('.bill-row'));
    }

    function calculateRow(row) {
        const select = row.querySelector('.product-select');
        const qtyInput = row.querySelector('.qty-input');
        const rowTotalSpan = row.querySelector('.row-total');
        
        const option = select.options[select.selectedIndex];
        if (option && option.value) {
            const price = parseFloat(option.dataset.price);
            const stock = parseInt(option.dataset.stock);
            const qty = parseInt(qtyInput.value) || 0;
            
            if (qty > stock) {
                qtyInput.classList.add('is-invalid');
                alert(`Error: Only ${stock} units in stock for ${option.text}`);
                qtyInput.value = stock;
                return calculateRow(row);
            } else {
                qtyInput.classList.remove('is-invalid');
            }
            
            const total = price * qty;
            rowTotalSpan.textContent = `₹${total.toFixed(2)}`;
        }
        calculateGrandTotal();
    }

    function calculateGrandTotal() {
        let grand = 0;
        document.querySelectorAll('.row-total').forEach(span => {
            const val = parseFloat(span.textContent.replace('₹', '')) || 0;
            grand += val;
        });
        document.getElementById('grandTotalText').textContent = `₹${grand.toFixed(2)}`;
    }

    // Add first row on load
    document.addEventListener('DOMContentLoaded', addRow);
</script>
<style>
    .bill-row:hover { background: rgba(0,0,0,0.02); }
    .product-select { background: rgba(255,255,255,0.9) !important; color: #111 !important; border: 1px solid #ccc; }
    .qty-input { background: rgba(255,255,255,0.9) !important; color: #111 !important; border: 1px solid #ccc; }
    .is-invalid { border-color: var(--danger) !important; }
</style>
{% endblock %}
{% endblock %}
