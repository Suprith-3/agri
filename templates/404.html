{% extends "base.html" %}
{% block title %}Page Not Found{% endblock %}

{% block content %}
<div class="row align-items-center justify-content-center min-vh-75" data-aos="zoom-in">
    <div class="col-lg-8 text-center position-relative">
        <div class="mb-5">
            <h1 class="display-1 fw-bold text-glow" style="font-family: var(--font-heading); font-size: 8rem; opacity: 0.15; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none;">404</h1>
            <div class="feature-icon-wrapper mx-auto mb-4" style="width: 120px; height: 120px; font-size: 4rem;">
                <i class="fa-solid fa-compass text-success"></i>
            </div>
            <h2 class="display-4 fw-bold text-white mb-3">Lost in the Fields?</h2>
            <p class="text-secondary fs-5 mx-auto mb-5" style="max-width: 500px;">The page you're searching for seems to have drifted away like seeds in the wind. Let's get you back on track.</p>
        </div>
        
        <div class="d-flex flex-wrap gap-4 justify-content-center">
            <a href="{{ url_for('index') }}" class="btn btn-primary-glow btn-lg px-5">
                <span><i class="fa-solid fa-house me-3"></i> Back to Home</span>
            </a>
            <a href="{{ url_for('chatbot.chat') }}" class="btn btn-outline-glow btn-lg px-5">
                <i class="fa-solid fa-robot me-3"></i> Ask AgriBot Help
            </a>
        </div>
    </div>
</div>
{% endblock %}
