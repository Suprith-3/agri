<div class="row g-4" data-aos="fade-up">
    {% if ai_schemes %}
        {% for s in ai_schemes %}
        <div class="col-md-6 col-lg-4">
            <div class="glass-card h-100 p-4 border-glow" style="background: rgba(76, 175, 80, 0.05);">
                <div class="d-flex justify-content-between align-items-start mb-3">
                    <div class="feature-icon-wrapper p-0" style="width: 40px; height: 40px; font-size: 1rem; background: rgba(76, 175, 80, 0.2);">
                        <i class="fa-solid fa-star text-success"></i>
                    </div>
                    <span class="badge bg-success-subtle text-success">AI Match</span>
                </div>
                <h5 class="fw-bold text-dark mb-2">{{ s.name }}</h5>
                <p class="text-secondary small mb-3">{{ s.description }}</p>
                <div class="bg-glass-sm p-2 rounded-3 mb-4">
                    <small class="text-muted d-block">Benefit:</small>
                    <span class="fw-bold text-success">{{ s.benefit }}</span>
                </div>
                <a href="{{ s.link if s.link.startswith('http') else 'https://' + s.link }}" target="_blank" class="btn btn-primary-glow btn-sm w-100 py-2">
                    <span>Apply Now <i class="fa-solid fa-external-link ms-1 small"></i></span>
                </a>
            </div>
        </div>
        {% endfor %}
    {% else %}
        <div class="col-12 text-center p-5">
            <i class="fa-solid fa-triangle-exclamation fa-3x text-warning opacity-30 mb-3"></i>
            <h5 class="text-secondary">BHOOMITRA AI couldn't find new schemes right now.</h5>
            <p class="text-muted">Try again in a few minutes or check your connection.</p>
        </div>
    {% endif %}
</div>
