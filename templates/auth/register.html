{% extends "base.html" %}
{% block title %}Farmer Registration{% endblock %}

{% block content %}
<div class="auth-container py-5">
    <div class="auth-card" style="max-width: 650px;" data-aos="zoom-in">
        <div class="text-center mb-5">
            <div class="feature-icon-wrapper mx-auto mb-4" style="width: 80px; height: 80px; font-size: 2.5rem;">
                <i class="fa-solid fa-seedling gradient-text"></i>
            </div>
            <h3 class="fw-bold text-white mb-2 h2">Join AgriSmart</h3>
            <p class="text-secondary mb-0">Create your free farmer account</p>
        </div>

        <form method="POST" action="{{ url_for('auth.register') }}" data-aos="fade-up" data-aos-delay="100">
            <div class="row g-4">
                <div class="col-12">
                    <label class="form-label">Full Name</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 border-glass"><i class="fa-regular fa-user text-muted"></i></span>
                        <input type="text" name="name" class="form-control border-start-0" required placeholder="ex. Ramesh Kumar">
                    </div>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" class="form-control" required placeholder="ramesh@email.com">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Phone No.</label>
                    <input type="text" name="phone" class="form-control" required placeholder="9876543210">
                </div>

                <div class="col-md-6">
                    <label class="form-label">State</label>
                    <select name="state" class="form-select" required>
                        <option value="">Choose...</option>
                        <option value="Maharashtra">Maharashtra</option>
                        <option value="Punjab">Punjab</option>
                        <option value="Uttar Pradesh">Uttar Pradesh</option>
                        <option value="Gujarat">Gujarat</option>
                        <option value="Karnataka">Karnataka</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">District</label>
                    <input type="text" name="district" class="form-control" required placeholder="ex. Pune">
                </div>

                <div class="col-12">
                    <label class="form-label">Total Farm Size (Acres)</label>
                    <div class="input-group">
                        <input type="number" step="0.1" name="farm_size" class="form-control border-end-0" required placeholder="5.5">
                        <span class="input-group-text bg-transparent border-start-0 border-glass text-secondary">Acres</span>
                    </div>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" required placeholder="••••••••">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" name="confirm_password" class="form-control" required placeholder="••••••••">
                </div>

                <div class="col-12 mt-5">
                    <button type="submit" class="btn btn-primary-glow w-100 py-3">
                        <span>Register <i class="fa-solid fa-arrow-right ms-2"></i></span>
                    </button>
                </div>
            </div>
        </form>
        
        <div class="text-center mt-5" data-aos="fade-up" data-aos-delay="200">
            <p class="text-secondary small">Already have an account? <a href="{{ url_for('auth.login') }}" class="text-success text-decoration-none fw-bold hover-glow">Log in</a></p>
        </div>
    </div>
</div>
{% endblock %}
